<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="theme-color" content="#dceeff" />
  <title>Friendship Run Live Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/friendship-run.css?v=8" />
</head>
<body class="tv-page">
  <section class="tv-gate is-active" id="tvGate">
    <div class="gate-card panel">
      <div class="brand-lockup"><span class="brand-rule"></span><p>SUNWAY PRE-U FRIENDSHIP RUN</p></div>
      <h1>Live <span>Leaderboard</span></h1>
      <p class="supporting-copy">Enter the event password once on this display.</p>
      <form id="tvAccessForm" class="form-stack">
        <label><span>Access password</span><input id="tvAccessPassword" type="password" required /></label>
        <button class="button primary" type="submit">Open leaderboard</button>
        <p id="tvAccessMessage" class="message"></p>
      </form>
    </div>
  </section>

  <main class="tv-board" id="tvBoard" hidden>
    <header class="tv-header">
      <div class="tv-brand">
        <span>SUNWAY PRE-U FRIENDSHIP RUN</span>
        <h1>Snake Challenge</h1>
      </div>
      <div class="tv-live"><i></i><span>LIVE SCOREBOARD</span><small id="lastUpdated">Updating...</small></div>
    </header>

    <section class="tv-podium" id="tvPodium"></section>

    <section class="tv-rankings panel">
      <div class="tv-rankings-head"><span>RANK</span><span>PLAYER</span><span>SCORE</span></div>
      <div id="tvLeaderboard" class="tv-ranking-list"></div>
    </section>

    <footer class="tv-footer"><span>MYR 3 PER ATTEMPT</span><span>PAY · REGISTER · PLAY</span><span>15 AUGUST 2026</span></footer>
  </main>

  <script src="/friendship-run-leaderboard.js?v=8"></script>
</body>
</html>
