<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Careers Admin — Aerinyu Studios</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="careers.css"></head><body class="admin-page"><main class="admin-shell"><header class="admin-heading"><div><p class="section-kicker">PRIVATE RECRUITMENT PANEL</p><h1>Careers Admin</h1></div><a href="careers.html">View public page</a></header><section class="admin-card" id="auth-card"><h2>Unlock posting controls</h2><p>Enter the private admin key stored in Vercel.</p><form id="auth-form" class="admin-form compact-form"><label><span>Admin key</span><input id="admin-key" type="password" required></label><button class="button button-light">Continue</button></form></section><section id="admin-panel" hidden><div class="admin-grid"><section class="admin-card"><div class="admin-card-heading"><div><p class="section-kicker">CREATE OR EDIT</p><h2>Job posting</h2></div><button id="reset-form" class="text-button" type="button">New posting</button></div><form id="job-form" class="admin-form"><input id="job-id" type="hidden"><label><span>Job title</span><input id="title" required maxlength="100"></label><div class="form-row"><label><span>Department</span><select id="department" required><option>Game Development</option><option>Marketing & Communications</option><option>Operations</option></select></label><label><span>Unit</span><select id="unit_name"><option value="">No unit</option><option>Concept and Narrative Unit</option><option>Content Development Unit</option><option>Software Engineering Unit</option></select></label></div><div class="form-row"><label><span>Work arrangement</span><select id="work_type"><option>Remote</option><option>Hybrid</option><option>On-site</option></select></label><label><span>Engagement type</span><select id="engagement_type"><option>Task-based</option><option>Part-time</option><option>Contract</option><option>Internship</option></select></label></div><label><span>Location</span><input id="location" value="Malaysia / Remote" required></label><label><span>Short summary — shown on card</span><textarea id="summary" rows="3" required maxlength="280"></textarea></label><label><span>About the role</span><textarea id="about_role" rows="5" required></textarea></label><label><span>What you’ll do — one per line</span><textarea id="responsibilities" rows="6" required></textarea></label><label><span>Required qualifications — one per line</span><textarea id="requirements" rows="6" required></textarea></label><label><span>Preferred qualifications — one per line</span><textarea id="preferred_skills" rows="4"></textarea></label><label><span>Benefits — one per line</span><textarea id="benefits" rows="4"></textarea></label><div class="form-row"><label><span>Schedule type</span><input id="schedule_type" value="Flexible / self-managed"></label><label><span>Estimated hours/week</span><input id="estimated_hours_per_week" type="number" min="0"></label></div><label><span>Hours description</span><textarea id="hours_description" rows="3"></textarea></label><label><span>Meeting requirements</span><input id="meeting_requirements"></label><div class="form-row"><label><span>Compensation type</span><input id="compensation_type" value="Task-cycle / commission-based"></label><label><span>Currency</span><select id="compensation_currency"><option>MYR</option><option>USD</option><option>GBP</option></select></label></div><div class="form-row"><label><span>Minimum compensation</span><input id="compensation_min" type="number" min="0" step="0.01"></label><label><span>Maximum compensation</span><input id="compensation_max" type="number" min="0" step="0.01"></label></div><label><span>Compensation details</span><textarea id="compensation" rows="3" placeholder="How scope, quality and task cycle affect payment"></textarea></label><label class="checkbox-label"><input id="is_open" type="checkbox" checked><span>Visible and accepting applications</span></label><button class="button button-light" type="submit">Save posting</button><p id="form-message" class="form-message"></p></form></section><section class="admin-card"><div class="admin-card-heading"><div><p class="section-kicker">MANAGE</p><h2>Existing roles</h2></div><button id="refresh-jobs" class="text-button" type="button">Refresh</button></div><div id="admin-jobs" class="admin-jobs"></div></section></div></section></main><script src="admin.js"></script></body></html>
